<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Nimeo</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}
nav{
    background:#333;
    padding:15px;
}
nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
    margin:0;
    padding:0;
}
nav li{
    margin:0 20px;
}
nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
header{
    text-align:center;
    padding:30px;
    background:white;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px;
}
.product{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.product img{
    width:100%;
}
.price{
    color:#27ae60;
    font-size:18px;
    font-weight:bold;
}
.btn{
    background:#ff6600;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
.btn:hover{
    background:#e65c00;
}
footer{
    text-align:center;
    background:#333;
    color:white;
    padding:15px;
}
</style>
</head>
<body>
<nav>
<ul>
<li><a href="#">Accueil</a></li>
<li><a href="#">Produits</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
<header>
<h1>Ma Boutique en ligne</h1>
<p>Bienvenue dans notre magasin en ligne pour tous vos besoin</p>
</header>
<section class="products">
<div class="product">
<img src="https://via.placeholder.com/250">
<h3>Montre</h3>
<p class="price">80€</p>
<button class="btn">Ajouter au panier</button>
</div>
<div class="product">
<img src="https://via.placeholder.com/250">
<h3>Chaussures</h3>
<p class="price">120€</p>
<button class="btn">Ajouter au panier</button>
</div>
<div class="product">
<img src="https://via.placeholder.com/250">
<h3>Sac</h3>
<p class="price">60€</p>
<button class="btn">Ajouter au panier</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>Lunettes</h3>
<p class="price">40€</p>
<button class="btn">Ajouter au panier</button>
</div>

</section>

<footer>
<p>© 2026 Ma Boutique</p>
</footer>

</body>
</html>
